name: Daily MLB HR Picks

on:
  schedule:
    # 11:30 UTC = 4:30 AM Pacific during daylight time / 7:30 AM Eastern
    # During standard time, this becomes 3:30 AM Pacific / 6:30 AM Eastern.
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  run-hr-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MLB HR Model
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          ODDS_REGIONS: ${{ secrets.ODDS_REGIONS }}
          ODDS_BOOKMAKERS: ${{ secrets.ODDS_BOOKMAKERS }}
        run: |
          python run_daily_mlb_hr_picks.py

      - name: Send HR email
        env:
          APPS_SCRIPT_EMAIL_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_EMAIL_WEBHOOK_URL }}
          APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN: ${{ secrets.APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -X POST "$APPS_SCRIPT_EMAIL_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN\",\"report\":\"hr\"}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"ok":true'

