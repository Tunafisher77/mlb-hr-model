name: Daily MLB HR Picks

on:
  schedule:
    # Runs at 6:50 AM Pacific during daylight time.
    # GitHub schedules use UTC. 13:50 UTC = 6:50 AM PDT.
    # This gives the sheet time to update before the 7:00 AM email trigger.
    - cron: '50 13 * * *'
  workflow_dispatch:

jobs:
  run-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MLB Model
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python run_daily_mlb_hr_picks.py

