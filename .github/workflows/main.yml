name: Daily MLB HR Picks

on:
  schedule:
    # 11:30 UTC = 4:30 AM Pacific during daylight time / 7:30 AM Eastern
    # During standard time, this becomes 3:30 AM Pacific / 6:30 AM Eastern.
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  run-hr-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

  

