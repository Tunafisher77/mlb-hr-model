name: Daily MLB Game Picks

on:
  schedule:
    # 11:45 UTC = 4:45 AM Pacific / 7:45 AM Eastern during daylight time
    - cron: "45 11 * * *"
  workflow_dispatch:

jobs:
  run-game-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Send Game Picks email
        env:
          WEBHOOK_TOKEN: ${{ secrets.APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN }}
        run: |
          WEBHOOK_URL="https://script.google.com/macros/s/AKfycbz48FC4tSTWDV6QkUeo3DgAJR0Ro-YOaGtlSdkvNI39jn3Ix-R7fUzk5JOWG9aKKOih/exec"

          if [ -z "$WEBHOOK_TOKEN" ]; then
            echo "Missing APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN secret"
            exit 1
          fi

          RESPONSE=$(curl -L --post302 --post303 -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$WEBHOOK_TOKEN\",\"report\":\"game\"}")

          echo "$RESPONSE"

          echo "$RESPONSE" | grep '"ok":true'

       
     
