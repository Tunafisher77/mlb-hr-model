name: Daily MLB Game Picks

on:
  schedule:
    # 11:45 UTC = 4:45 AM Pacific / 7:45 AM Eastern during daylight time
    - cron: "45 11 * * *"
  workflow_dispatch:

jobs:
  run-game-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MLB Game Picks Model
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python run_daily_mlb_game_picks.py

       
     
