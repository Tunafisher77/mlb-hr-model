name: Daily MLB Game Picks

on:
  schedule:
    # 11:45 UTC = 4:45 AM Pacific during daylight time / 7:45 AM Eastern
    # During standard time, this becomes 3:45 AM Pacific / 6:45 AM Eastern.
    - cron: "45 11 * * *"
  workflow_dispatch:

jobs:
  run-game-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run MLB Game Picks Model
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python run_daily_mlb_game_picks.py

      - name: Send Game Picks email
        env:
          APPS_SCRIPT_EMAIL_WEBHOOK_URL: ${{ secrets.APPS_SCRIPT_EMAIL_WEBHOOK_URL }}
          APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN: ${{ secrets.APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -X POST "$APPS_SCRIPT_EMAIL_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"$APPS_SCRIPT_EMAIL_WEBHOOK_TOKEN\",\"report\":\"game\"}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep '"ok":true'
