name: Daily MLB Game Picks

on:
  schedule:
    - cron: "10 13 * * *"  # 6:05 AM Pacific / 9:05 AM Eastern during MLB season
  workflow_dispatch:

jobs:
  run-game-model:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run MLB Game Picks Model
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python run_daily_mlb_game_picks.py
